# ---- Newsletter: a-guide-to-ai-prototyping-for-product-managers.md ----
- id: q0028
  question: "According to Lenny's AI prototyping guide for PMs, why should PMs prototype with AI before writing specs?"
  expected_answer: >
    Because a working prototype communicates intent faster and more
    accurately than a written spec, surfaces edge cases earlier, and gives
    engineering and design a concrete target to critique rather than an
    abstract document.
  ground_truth_sources:
    - newsletters/a-guide-to-ai-prototyping-for-product-managers.md
  tags: [pm, ai, prototyping]
  difficulty: medium

# ---- Newsletter: product-manager-is-an-unfair-role-so-work-unfairly.md ----
- id: q0029
  question: "What is the core argument of the essay 'Product manager is an unfair role, so work unfairly'?"
  expected_answer: >
    Because PMs are accountable for outcomes they do not directly control,
    they should stop trying to be scrupulously fair about attention and
    effort and instead concentrate disproportionately on the few bets that
    most move the business.
  ground_truth_sources:
    - newsletters/product-manager-is-an-unfair-role-so-work-unfairly.md
  tags: [pm, career]
  difficulty: hard
