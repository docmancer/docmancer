# Lenny's Newsletter + Podcast benchmark dataset.
#
# Hand-authored by the docmancer maintainers for use with
# `docmancer bench dataset use lenny`. The corpus itself is fetched on
# demand from https://github.com/LennysNewsletter/lennys-newsletterpodcastdata
# and cached under ~/.docmancer/bench/corpora/lenny/. Corpus content is
# licensed by Lenny Rachitsky for personal non-commercial use; these
# authored questions and answers are docmancer's own copyright.
#
# Source references use paths relative to the corpus root so the dataset
# works regardless of where the corpus is cloned.

version: 1
corpus_ref: null  # Filled in by `docmancer bench dataset use lenny`.
metadata:
  corpus: lenny
  source: "Lenny's Newsletter and Podcast starter pack"
  source_url: "https://github.com/LennysNewsletter/lennys-newsletterpodcastdata"
  mode: hand_authored
  description: >
    30 hand-authored questions covering newsletters and podcast transcripts
    on product strategy, growth, AI tooling, and team leadership. Used as the
    default zero-config docmancer bench target.

questions:

# ---- Newsletter: everyone-should-be-using-claude-code-more.md ----
- id: q0000
  question: "What command does Lenny recommend running on a Mac to install Claude Code?"
  expected_answer: "curl -fsSL https://claude.ai/install.sh | bash"
  ground_truth_sources:
    - newsletters/everyone-should-be-using-claude-code-more.md
  tags: [claude-code, installation]
  difficulty: easy

- id: q0001
  question: "Whose conversation with Lenny first made him want to try Claude Code?"
  expected_answer: "Dan Shipper's conversation with Lenny on the podcast."
  ground_truth_sources:
    - newsletters/everyone-should-be-using-claude-code-more.md
  tags: [claude-code]
  difficulty: easy

- id: q0002
  question: "Why does Lenny suggest thinking of Claude Code as 'Claude Local' or 'Claude Agent' rather than a coding tool?"
  expected_answer: >
    Because it runs on your own machine and can perform tasks directly on
    your computer - organizing files, enhancing images, summarizing calls,
    creating Linear tickets, and more - so non-technical people benefit
    from it just as much as engineers.
  ground_truth_sources:
    - newsletters/everyone-should-be-using-claude-code-more.md
  tags: [claude-code, framing]
  difficulty: medium

# ---- Newsletter: an-ai-glossary.md ----
- id: q0003
  question: "What does the 'o' in GPT-4o stand for?"
  expected_answer: "Omni, meaning it accepts any combination of text, audio, and image input."
  ground_truth_sources:
    - newsletters/an-ai-glossary.md
  tags: [ai-basics, glossary]
  difficulty: easy

- id: q0004
  question: "Which year and which company introduced the transformer architecture?"
  expected_answer: "2017, by Google researchers."
  ground_truth_sources:
    - newsletters/an-ai-glossary.md
  tags: [ai-basics, glossary]
  difficulty: easy

- id: q0005
  question: "What attention mechanism distinguishes the transformer from earlier sequential models?"
  expected_answer: >
    Attention lets the model consider all words in the input at once rather
    than reading them sequentially, so it captures relationships between
    distant tokens and handles context and nuance far better than prior
    architectures.
  ground_truth_sources:
    - newsletters/an-ai-glossary.md
  tags: [ai-basics, transformers]
  difficulty: medium

# ---- Newsletter: how-duolingo-reignited-user-growth.md ----
- id: q0006
  question: "By roughly how much did Duolingo grow daily active users over the four years Jorge Mazal describes?"
  expected_answer: "About 4.5x over four years."
  ground_truth_sources:
    - newsletters/how-duolingo-reignited-user-growth.md
  tags: [growth, case-study]
  difficulty: easy

- id: q0007
  question: "Why did Duolingo prioritize retention over acquisition when trying to reignite growth?"
  expected_answer: >
    Because all new-user acquisition was organic and they had no obvious
    lever to supercharge it, while existing gamification mechanics and
    benchmarks from top digital games suggested retention had more room to
    improve.
  ground_truth_sources:
    - newsletters/how-duolingo-reignited-user-growth.md
  tags: [growth, retention]
  difficulty: medium

- id: q0008
  question: "Which three gamification mechanics did Duolingo use to drive its growth reacceleration?"
  expected_answer: "Leaderboards, streaks, and push notifications (also progression on the home screen and achievements)."
  ground_truth_sources:
    - newsletters/how-duolingo-reignited-user-growth.md
  tags: [growth, gamification]
  difficulty: medium

# ---- Podcast: amol-avasare.md (Anthropic growth) ----
- id: q0009
  question: "Which AI product does Amol Avasare's episode describe as the fastest-growing AI product in history?"
  expected_answer: "Claude, Anthropic's AI assistant, going from $1B to $19B in revenue."
  ground_truth_sources:
    - podcasts/amol-avasare.md
  tags: [growth, ai]
  difficulty: easy

- id: q0010
  question: "According to Amol Avasare, what is the 'cold start' problem in AI product activation?"
  expected_answer: >
    New users often do not know what to prompt an AI product with on first
    use, so the activation challenge is giving them a starting prompt,
    template, or example that produces a meaningful result immediately.
  ground_truth_sources:
    - podcasts/amol-avasare.md
  tags: [activation, ai-product]
  difficulty: medium

- id: q0011
  question: "Why does Amol Avasare argue that adding friction can sometimes improve conversion?"
  expected_answer: >
    Thoughtful friction - such as a brief onboarding question or a choice
    that forces intent - filters for users who will actually activate and
    gives the product signal to personalize, which raises downstream
    conversion even though it lowers top-of-funnel volume.
  ground_truth_sources:
    - podcasts/amol-avasare.md
  tags: [activation, conversion]
  difficulty: hard

# ---- Podcast: simon-willison.md ----
- id: q0012
  question: "What does Simon Willison mean by 'passing the inflection point' in his AI state of the union?"
  expected_answer: >
    That AI capabilities have crossed the threshold where they are useful
    for real work across many domains, so adoption and automation timelines
    are now being driven by product, integration, and trust rather than raw
    model capability alone.
  ground_truth_sources:
    - podcasts/simon-willison.md
  tags: [ai, state-of-ai]
  difficulty: hard

# ---- Podcast: boris-cherny.md ----
- id: q0013
  question: "Who is Boris Cherny and what Anthropic product is he associated with?"
  expected_answer: "Boris Cherny is the creator and lead of Claude Code at Anthropic."
  ground_truth_sources:
    - podcasts/boris-cherny.md
  tags: [claude-code, people]
  difficulty: easy

- id: q0014
  question: "What shift in how software is written does Boris Cherny think teams are heading toward?"
  expected_answer: >
    A shift where engineers spend more time orchestrating and reviewing AI
    agents that do the actual writing, editing, and refactoring, rather
    than typing code line by line themselves.
  ground_truth_sources:
    - podcasts/boris-cherny.md
  tags: [engineering, ai]
  difficulty: medium

# ---- Podcast: brian-halligan.md ----
- id: q0015
  question: "What company did Brian Halligan co-found, and for roughly how long was he its CEO?"
  expected_answer: "HubSpot, for about 15 years."
  ground_truth_sources:
    - podcasts/brian-halligan.md
  tags: [founders, hubspot]
  difficulty: easy

- id: q0016
  question: "Why does Brian Halligan say it has never been easier to start a company but never been harder to scale one?"
  expected_answer: >
    AI tooling, cheap cloud, and no-code platforms have collapsed the cost
    and time to ship a first version, but competition, distribution noise,
    and hiring talent at scale have intensified, so getting from product to
    durable business is harder than before.
  ground_truth_sources:
    - podcasts/brian-halligan.md
  tags: [founders, scaling]
  difficulty: hard

