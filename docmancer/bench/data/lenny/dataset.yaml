# ---- Newsletter: beyond-vibe-checks-a-pms-complete-guide-to-evals.md ----
- id: q0022
  question: "In the evals guide for PMs, what is a 'vibe check' and why is it not enough?"
  expected_answer: >
    A vibe check is a quick, informal read on whether an AI feature feels
    right based on a handful of examples. It is not enough because it does
    not measure quality systematically, does not catch regressions, and
    cannot be rerun as models or prompts change.
  ground_truth_sources:
    - newsletters/beyond-vibe-checks-a-pms-complete-guide-to-evals.md
  tags: [evals, pm]
  difficulty: medium

# ---- Newsletter: what-people-are-vibe-coding-and-actually-using.md ----
- id: q0023
  question: "What category of app does Lenny's 'vibe coding' newsletter say people most often build and actually keep using?"
  expected_answer: >
    Small personal-productivity tools and single-purpose utilities that
    solve one specific problem for the builder or a small audience, rather
    than general-purpose consumer apps.
  ground_truth_sources:
    - newsletters/what-people-are-vibe-coding-and-actually-using.md
  tags: [vibe-coding, ai]
  difficulty: medium

# ---- Newsletter: state-of-the-product-job-market-in-2025.md ----
- id: q0024
  question: "What broad trend does Lenny describe in the 2025 state of the product job market?"
  expected_answer: >
    The PM job market bifurcated: senior PMs with AI fluency and scope are
    in high demand, while junior PM openings have contracted as teams use
    AI to flatten PM headcount per product area.
  ground_truth_sources:
    - newsletters/state-of-the-product-job-market-in-2025.md
  tags: [careers, pm]
  difficulty: hard

